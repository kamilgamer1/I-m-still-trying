<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matte Red Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- CSS Controllers (Must remain at root level) -->
    <input type="radio" id="tab-home" name="nav" checked>
    <input type="radio" id="tab-games" name="nav">

    <!-- Sidebar Navigation -->
    <aside class="sidebar">
        <div class="logo">DASHBOARD</div>
        <ul class="nav-links">
            <li><label for="tab-home">Home</label></li>
            <li><label for="tab-games">Games</label></li>
        </ul>
    </aside>

    <!-- Main Content Wrapper -->
    <main class="content">

        <!-- TAB 1: HOME -->
        <div class="section" id="section-home">
            <h1>Home</h1>
            <div class="grid">
                <div class="card card-red">
                    <h3>Welcome Back</h3>
                    <p class="big-number">Active</p>
                    <a href="#" class="action-btn" style="background-color: rgba(255,255,255,0.2);">View Profile</a>
                </div>
                <div class="card">
                    <h3>Quick Status</h3>
                    <p class="big-number">100%</p>
                </div>
            </div>
        </div>

        <!-- TAB 2: GAMES -->
        <div class="section" id="section-games">
            <h1>Games</h1>
            <div class="grid">
                <div class="card">
                    <h3>Hours Played</h3>
                    <p class="big-number">1,240</p>
                </div>
                <div class="card">
                    <h3>Achievements</h3>
                    <p class="big-number">84</p>
                </div>
            </div>
        </div>

    </main>

</body>
</html>
